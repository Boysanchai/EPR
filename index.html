<style>

.qr-modal.active{ display:flex; }

  width:95%; max-width:520px; background:#111827; border-radius:16px;

}
#qrVideo{
  width:100%; border-radius:12px; background:black;
}
.qr-status{
  color:white; text-align:center; margin-top:12px; font-size:14px; white-space:pre-line;
}
.qr-status.success{ color:#00ff99; }
.qr-status.error{ color:#ff7777; }

.topbar-gold { border-bottom: 2px solid rgba(201,168,76,0.4); }

<body class="min-h-screen pb-6">

<!-- LOGIN MODAL -->
<div id="loginModal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(10,18,32,0.92);backdrop-filter:blur(8px);align-items:center;justify-content:center;">
  <div style="background:#0f1b2d;border:1px solid rgba(201,168,76,0.35);border-radius:20px;padding:32px 28px;width:340px;max-width:90vw;box-shadow:0 24px 60px rgba(0,0,0,0.6);text-align:center;">
    <div style="width:56px;height:56px;border-radius:50%;margin:0 auto 16px;background:linear-gradient(135deg,#c9a84c,#f0d080);display:flex;align-items:center;justify-content:center;">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#0f1b2d" stroke-width="2.2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </div>

    <div style="font-size:13px;color:rgba(255,255,255,0.45);margin-bottom:24px;">กรุณากรอก Email เพื่อเข้าสู่ระบบ</div>
    <input id="loginEmailInput" type="email" placeholder="your@email.com" style="width:100%;padding:12px 14px;border-radius:10px;border:1px solid rgba(201,168,76,0.4);background:rgba(255,255,255,0.06);color:#fff;font-size:14px;outline:none;box-sizing:border-box;text-align:center;" onkeydown="if(event.key==='Enter') submitLoginEmail()">
    <div id="loginError" style="color:#fca5a5;font-size:12px;margin-top:8px;display:none;">กรุณากรอก Email ให้ถูกต้อง</div>
    <button onclick="submitLoginEmail()" style="width:100%;margin-top:16px;padding:12px;border-radius:10px;background:linear-gradient(135deg,#c9a84c,#f0d080);color:#0f1b2d;font-size:14px;font-weight:700;border:none;cursor:pointer;">เข้าสู่ระบบ</button>
  </div>
</div>

<!-- MENU PAGE -->
<div id="menuPage" class="min-h-screen">
  <div class="topbar-gold px-6 py-4 flex justify-between items-center shadow-lg" style="background:#0f1b2d;">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-lg flex items-center justify-center" style="background:linear-gradient(135deg,#c9a84c,#f0d080);">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="#0f1b2d" stroke-width="2.2">
          <path d="M3 7l9-4 9 4-9 4-9-4z"/><path d="M3 12l9 4 9-4"/><path d="M3 17l9 4 9-4"/>
        </svg>
      </div>
      <div>
        <h1 class="text-base font-semibold tracking-wide" style="color:#f0d080;">PMN SYSTEM</h1>
        <p class="text-xs" style="color:rgba(255,255,255,0.45);">Stock & Sparepart Management</p>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="text-sm" id="userEmail" style="color:rgba(255,255,255,0.55);">USER</div>
      <button onclick="logoutUser()" style="font-size:11px;padding:3px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.4);background:transparent;cursor:pointer;">⇄ เปลี่ยน</button>
    </div>
  </div>
  <div class="gold-line"></div>

  <div class="max-w-7xl mx-auto p-6 space-y-6">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <div onclick="showInput()" class="cursor-pointer rounded-xl overflow-hidden h-52 relative"> <!-- สรุปเมนูสั้น ๆ --> ... </div>
      <!-- เมนูอื่นๆ คุณสามารถเพิ่มได้ตามไฟล์เดิม -->
    </div>
  </div>
</div>

<!-- INPUT PAGE, REPORT PAGE, FORM PAGE ฯลฯ (ย่อเพื่อความกระชับ) -->
<!-- คุณสามารถนำเนื้อหาจากไฟล์เดิมมาต่อที่นี่ -->

<!-- ================= QR SCANNER MODAL (เวอร์ชันแก้ไข) ================= -->
<div id="qrModal" class="qr-modal">
  <div class="qr-box">
    <div class="text-center mb-4">
      <div class="text-[#f0d080] font-bold text-lg">📷 สแกน QR Code</div>
      <div class="text-xs text-gray-400">นำ QR Code เข้าหาเฟรม</div>
    </div>
    <video id="qrVideo" autoplay playsinline muted></video>
    <canvas id="qrCanvas" style="display:none;"></canvas>
    <div id="qrStatus" class="qr-status">กำลังเปิดกล้อง...</div>
    <div class="flex gap-3 mt-5">
      <button onclick="switchCamera()" class="flex-1 py-3 bg-gray-800 hover:bg-gray-700 rounded-xl text-white font-medium">🔄 สลับกล้อง</button>
      <button onclick="closeQR()" class="flex-1 py-3 bg-red-600 hover:bg-red-700 rounded-xl text-white font-medium">ปิด</button>
    </div>
  </div>
</div>

<script>
// ==================== CONFIG ====================
const API_URL = "https://script.google.com/macros/s/AKfycbxXemaC6QHGsEwN5RpxUkFkm32OcAth_OxLxxsNb5m-VKR5d1WgHUqejrCgjG4dZ-KN/exec";

// ==================== QR SCANNER (แก้ไขแล้ว) ====================
let qrStream = null;
let qrAnimFrame = null;
let qrTargetField = null;
let currentFacingMode = "environment";

const video = document.getElementById("qrVideo");
const canvas = document.getElementById("qrCanvas");
const qrStatus = document.getElementById("qrStatus");

async function openQR(targetFieldId) {
  qrTargetField = targetFieldId;
  document.getElementById("qrModal").classList.add("active");
  qrStatus.textContent = "กำลังเปิดกล้อง...";
  qrStatus.className = "qr-status";
  await startCamera();
}

async function startCamera() {
  try {
    if (qrStream) stopCamera();
    qrStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: currentFacingMode }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = qrStream;
    await video.play();
    qrStatus.textContent = "กำลังสแกน...";
    scanQR();
  } catch (err) {
    console.error(err);
    qrStatus.textContent = "เปิดกล้องไม่ได้";
    qrStatus.className = "qr-status error";
    alert("⚠️ เปิดกล้องไม่ได้\n\n• ต้องใช้ HTTPS\n• อนุญาตกล้อง");
  }
}

function stopCamera() {
  if (qrAnimFrame) cancelAnimationFrame(qrAnimFrame);
  if (qrStream) qrStream.getTracks().forEach(track => track.stop());
  qrStream = null;
  video.srcObject = null;
}

function scanQR() {
  if (!video.videoWidth) {
    qrAnimFrame = requestAnimationFrame(scanQR);
    return;
  }
  try {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "attemptBoth" });
    if (code && code.data) {
      onQRFound(code.data);
      return;
    }
  } catch (e) {}
  qrAnimFrame = requestAnimationFrame(scanQR);
}

function onQRFound(value) {
  qrStatus.textContent = `✓ พบ: ${value}`;
  qrStatus.className = "qr-status success";
  if (qrTargetField) {
    const field = document.getElementById(qrTargetField);
    if (field) {
      field.value = value.trim();
      if (qrTargetField === "in_itemCode") searchInputItem("code");
      else if (qrTargetField === "itemCode") searchItemClient("code");
    }
  }
  setTimeout(closeQR, 800);
}

function closeQR() {
  stopCamera();
  document.getElementById("qrModal").classList.remove("active");
  qrTargetField = null;
}

async function switchCamera() {
  currentFacingMode = currentFacingMode === "environment" ? "user" : "environment";
  stopCamera();
  await startCamera();
}

// ==================== API ====================
async function api(action, payload = {}) {
  const res = await fetch(API_URL, {
    method: "POST",
    headers: {"Content-Type": "text/plain;charset=utf-8"},
    body: JSON.stringify({action, ...payload})
  });
  return await res.json();
}

// ==================== ฟังก์ชันอื่นๆ ====================
function logoutUser() {
  localStorage.removeItem("pmn_user_email");
  document.getElementById("loginModal").style.display = "flex";
}

function submitLoginEmail() {
  const email = document.getElementById("loginEmailInput").value.trim();
  if (!email.includes("@")) return;
  localStorage.setItem("pmn_user_email", email);
  document.getElementById("userEmail").textContent = email.split("@")[0];
  document.getElementById("loginModal").style.display = "none";
}

async function searchInputItem(type) { /* เพิ่มโค้ดตามต้องการ */ }
async function searchItemClient(type) { /* เพิ่มโค้ดตามต้องการ */ }

function showInput() { alert("ไปหน้า Input"); }
function showForm() { alert("ไปหน้า Requisition"); }
function showReport() { alert("ไปหน้า Report"); }

// โหลดหน้าเริ่มต้น
window.onload = () => {
  const saved = localStorage.getItem("pmn_user_email");
  if (saved) {
    document.getElementById("userEmail").textContent = saved.split("@")[0];
  } else {
    document.getElementById("loginModal").style.display = "flex";
  }
};
</script>
</body>
</html>
